name: CI

on:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  push:
    branches: ["**"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"

permissions:
  contents: read
  packages: write

env:
  ENV: test
  UPLOAD_DIR: /tmp/stss-uploads
  TOKEN_SECRET_KEY: ${{ secrets.TOKEN_SECRET_KEY }}
  REGISTRY: ghcr.io

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          cache: true
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          cache: true
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Prepare runtime dirs
        run: mkdir -p data logs "$UPLOAD_DIR"

      - name: Run smoke tests
        run: uv run pytest -m smoke

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          cache: true
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Prepare runtime dirs
        run: mkdir -p data logs "$UPLOAD_DIR"

      - name: Run unit tests
        run: uv run pytest -m unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          cache: true
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Prepare runtime dirs
        run: mkdir -p data logs "$UPLOAD_DIR"

      - name: Run integration tests
        run: uv run pytest -m integration

  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          cache: true
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Prepare runtime dirs
        run: mkdir -p data logs "$UPLOAD_DIR"

      - name: Run coverage
        run: uv run pytest --cov=auth_service --cov=info_service --cov=shared --cov-report=term-missing --cov-fail-under=80

  publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: coverage
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: au12321ua
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push stss-auth
        uses: docker/build-push-action@v6
        with:
          context: .
          file: auth_service/Dockerfile
          push: true
          tags: |
            ghcr.io/au12321ua/stss-auth:latest
            ghcr.io/au12321ua/stss-auth:${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=stss-auth
          cache-to: type=gha,mode=min,scope=stss-auth

      - name: Build and push stss-info
        uses: docker/build-push-action@v6
        with:
          context: .
          file: info_service/Dockerfile
          push: true
          tags: |
            ghcr.io/au12321ua/stss-info:latest
            ghcr.io/au12321ua/stss-info:${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=stss-info
          cache-to: type=gha,mode=min,scope=stss-info

      - name: Build and push stss-seed
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/Dockerfile
          push: true
          tags: |
            ghcr.io/au12321ua/stss-seed:latest
            ghcr.io/au12321ua/stss-seed:${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=stss-seed
          cache-to: type=gha,mode=min,scope=stss-seed
