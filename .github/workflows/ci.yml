name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["**"]

permissions:
  contents: read

env:
  ENV: test
  AUTH_DATABASE_URL: sqlite+aiosqlite:///./data/auth-ci.db
  INFO_DATABASE_URL: sqlite+aiosqlite:///./data/info-ci.db
  AUDIT_DATABASE_URL: sqlite+aiosqlite:///./data/audit-ci.db
  UPLOAD_DIR: /tmp/stss-uploads
  TOKEN_SECRET_KEY: ${{ secrets.TOKEN_SECRET_KEY }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          cache: true
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          cache: true
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Prepare runtime dirs
        run: mkdir -p data logs "$UPLOAD_DIR"

      - name: Run smoke tests
        run: uv run pytest -m smoke

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          cache: true
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Prepare runtime dirs
        run: mkdir -p data logs "$UPLOAD_DIR"

      - name: Run unit tests
        run: uv run pytest -m unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          cache: true
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Prepare runtime dirs
        run: mkdir -p data logs "$UPLOAD_DIR"

      - name: Run integration tests
        shell: bash
        run: |
          set +e
          uv run pytest -m integration
          code=$?
          if [ "$code" -eq 5 ]; then
            echo "No integration tests collected, skip this stage for now."
            exit 0
          fi
          exit "$code"

  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
          cache: true
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Prepare runtime dirs
        run: mkdir -p data logs "$UPLOAD_DIR"

      - name: Run coverage
        run: uv run pytest --cov=. --cov-report=term-missing --cov-fail-under=90
