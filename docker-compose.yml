version: "3.9"

services:
  auth_service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - auth_data:/app/auth_service/data
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  info_service:
    build:
      context: .
      dockerfile: info_service/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - .env
    volumes:
      - info_data:/app/info_service/data
      - uploads:/app/info_service/uploads
      - logs:/app/info_service/logs
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8002 --reload

volumes:
  auth_data:
  info_data:
  uploads:
  logs:
